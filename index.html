<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจองรถ กฟภ. (PEA Vehicle Booking)</title>
    <!-- ใช้ Tailwind CSS สำหรับตกแต่ง -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- ใช้ Font Awesome สำหรับไอคอน -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        peaGreen: '#006633', // สีเขียว กฟภ.
                        peaYellow: '#FFCC00', // สีเหลือง กฟภ.
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 font-sans">

    <!-- Navbar -->
    <nav class="bg-peaGreen text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <i class="fas fa-bolt text-peaYellow text-2xl mr-3"></i>
                    <span class="text-xl font-bold">ระบบจัดการยานพาหนะ กฟภ.</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="hidden md:inline"><i class="fas fa-user-circle mr-2"></i>นายทดสอบ ระบบ</span>
                    <button class="bg-peaYellow text-peaGreen px-4 py-2 rounded font-semibold hover:bg-yellow-300 transition">ออกจากระบบ</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Header & Search -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 bg-white p-4 rounded-lg shadow">
            <h2 class="text-2xl font-bold text-gray-800 mb-4 md:mb-0"><i class="fas fa-car text-peaGreen mr-2"></i>จองรถยนต์ส่วนกลาง</h2>
            <div class="flex space-x-2 w-full md:w-auto">
                <input type="date" class="border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-peaGreen">
                <select class="border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-peaGreen">
                    <option>ทุกประเภทรถ</option>
                    <option>รถเก๋ง</option>
                    <option>รถกระบะ</option>
                    <option>รถตู้</option>
                    <option>รถบัส</option>
                </select>
                <button class="bg-peaGreen text-white px-4 py-2 rounded hover:bg-green-800 transition"><i class="fas fa-search"></i> ค้นหา</button>
            </div>
        </div>

        <!-- Car List Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            
            <!-- Car Card 1 -->
            <div class="bg-white rounded-lg shadow-lg overflow-hidden hover:shadow-xl transition duration-300">
                <div class="bg-gray-200 h-48 flex items-center justify-center">
                    <i class="fas fa-car-side text-gray-400 text-6xl"></i> <!-- ใส่รูปภาพรถแทนไอคอนได้ -->
                </div>
                <div class="p-5">
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="text-xl font-bold text-gray-800">Toyota Camry</h3>
                        <span class="bg-green-100 text-green-800 text-xs font-semibold mr-2 px-2.5 py-0.5 rounded">ว่าง</span>
                    </div>
                    <p class="text-gray-600 mb-4"><i class="fas fa-id-badge mr-2"></i>ทะเบียน: กข 1234 กรุงเทพมหานคร</p>
                    <div class="flex justify-between text-sm text-gray-500 mb-4">
                        <span><i class="fas fa-users mr-1"></i> 5 ที่นั่ง</span>
                        <span><i class="fas fa-gas-pump mr-1"></i> เบนซิน</span>
                    </div>
                    <button onclick="openModal('Toyota Camry', 'กข 1234 กรุงเทพมหานคร')" class="w-full bg-peaYellow text-peaGreen font-bold py-2 rounded hover:bg-yellow-300 transition">
                        <i class="fas fa-calendar-check mr-2"></i>จองรถคันนี้
                    </button>
                </div>
            </div>

            <!-- Car Card 2 -->
            <div class="bg-white rounded-lg shadow-lg overflow-hidden hover:shadow-xl transition duration-300">
                <div class="bg-gray-200 h-48 flex items-center justify-center">
                    <i class="fas fa-truck-pickup text-gray-400 text-6xl"></i>
                </div>
                <div class="p-5">
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="text-xl font-bold text-gray-800">Nissan Navara</h3>
                        <span class="bg-green-100 text-green-800 text-xs font-semibold mr-2 px-2.5 py-0.5 rounded">ว่าง</span>
                    </div>
                    <p class="text-gray-600 mb-4"><i class="fas fa-id-badge mr-2"></i>ทะเบียน: ขค 5678 นนทบุรี</p>
                    <div class="flex justify-between text-sm text-gray-500 mb-4">
                        <span><i class="fas fa-users mr-1"></i> 5 ที่นั่ง</span>
                        <span><i class="fas fa-gas-pump mr-1"></i> ดีเซล</span>
                    </div>
                    <button onclick="openModal('Nissan Navara', 'ขค 5678 นนทบุรี')" class="w-full bg-peaYellow text-peaGreen font-bold py-2 rounded hover:bg-yellow-300 transition">
                        <i class="fas fa-calendar-check mr-2"></i>จองรถคันนี้
                    </button>
                </div>
            </div>

            <!-- Car Card 3 -->
            <div class="bg-white rounded-lg shadow-lg overflow-hidden hover:shadow-xl transition duration-300">
                <div class="bg-gray-200 h-48 flex items-center justify-center">
                    <i class="fas fa-shuttle-van text-gray-400 text-6xl"></i>
                </div>
                <div class="p-5">
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="text-xl font-bold text-gray-800">Toyota Commuter</h3>
                        <span class="bg-red-100 text-red-800 text-xs font-semibold mr-2 px-2.5 py-0.5 rounded">ไม่ว่าง</span>
                    </div>
                    <p class="text-gray-600 mb-4"><i class="fas fa-id-badge mr-2"></i>ทะเบียน: ฎฎ 9012 ปทุมธานี</p>
                    <div class="flex justify-between text-sm text-gray-500 mb-4">
                        <span><i class="fas fa-users mr-1"></i> 12 ที่นั่ง</span>
                        <span><i class="fas fa-gas-pump mr-1"></i> ดีเซล</span>
                    </div>
                    <button disabled class="w-full bg-gray-300 text-gray-500 font-bold py-2 rounded cursor-not-allowed">
                        <i class="fas fa-ban mr-2"></i>ไม่ว่าง
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- Modal ฟอร์มจองรถ -->
    <div id="bookingModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex justify-center items-center z-50">
        <div class="bg-white rounded-lg shadow-2xl w-full max-w-lg mx-4 overflow-hidden">
            <div class="bg-peaGreen text-white p-4 flex justify-between items-center">
                <h3 class="text-xl font-bold"><i class="fas fa-file-alt mr-2"></i>แบบฟอร์มจองรถ</h3>
                <button onclick="closeModal()" class="text-white text-2xl hover:text-peaYellow">&times;</button>
            </div>
            <div class="p-6">
                <div class="mb-4 bg-gray-50 p-3 rounded border border-gray-200">
                    <p class="font-semibold text-peaGreen" id="modalCarName">ชื่อรถ</p>
                    <p class="text-sm text-gray-600" id="modalCarPlate">ทะเบียน</p>
                </div>
                <form id="bookingForm">
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-gray-700 text-sm font-bold mb-2">วันที่ออกเดินทาง</label>
                            <input type="date" class="w-full border rounded py-2 px-3 focus:outline-none focus:ring-2 focus:ring-peaGreen" required>
                        </div>
                        <div>
                            <label class="block text-gray-700 text-sm font-bold mb-2">เวลาออกเดินทาง</label>
                            <input type="time" class="w-full border rounded py-2 px-3 focus:outline-none focus:ring-2 focus:ring-peaGreen" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2">จุดปลายทาง / สถานที่ไปราชการ</label>
                        <input type="text" placeholder="เช่น สำนักงาน กฟภ. เขต 3 นนทบุรี" class="w-full border rounded py-2 px-3 focus:outline-none focus:ring-2 focus:ring-peaGreen" required>
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2">วัตถุประสงค์ / รายละเอียดการไปราชการ</label>
                        <textarea rows="3" placeholder="เช่น ประชุมเชิงปฏิบัติการประจำปี 2567" class="w-full border rounded py-2 px-3 focus:outline-none focus:ring-2 focus:ring-peaGreen" required></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div>
                            <label class="block text-gray-700 text-sm font-bold mb-2">จำนวนผู้โดยสาร</label>
                            <input type="number" value="1" min="1" class="w-full border rounded py-2 px-3 focus:outline-none focus:ring-2 focus:ring-peaGreen" required>
                        </div>
                        <div>
                            <label class="block text-gray-700 text-sm font-bold mb-2">ผู้ขอใช้รถ (ชื่อ-สกุล)</label>
                            <input type="text" value="นายทดสอบ ระบบ" class="w-full border rounded py-2 px-3 focus:outline-none focus:ring-2 focus:ring-peaGreen" required>
                        </div>
                    </div>
                    <div class="flex justify-end space-x-3">
                        <button type="button" onclick="closeModal()" class="px-4 py-2 bg-gray-300 text-gray-700 rounded hover:bg-gray-400 transition">ยกเลิก</button>
                        <button type="submit" class="px-4 py-2 bg-peaGreen text-white rounded hover:bg-green-800 transition font-bold"><i class="fas fa-paper-plane mr-2"></i>ส่งคำขอจอง</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // ฟังก์ชันเปิด Modal และส่งข้อมูลรถเข้าไป
        function openModal(carName, carPlate) {
            document.getElementById('modalCarName').innerText = carName;
            document.getElementById('modalCarPlate').innerText = 'ทะเบียน: ' + carPlate;
            document.getElementById('bookingModal').classList.remove('hidden');
        }

        // ฟังก์ชันปิด Modal
        function closeModal() {
            document.getElementById('bookingModal').classList.add('hidden');
        }

        // จับ event ตอนกดส่งฟอร์มจอง
        document.getElementById('bookingForm').addEventListener('submit', function(e) {
            e.preventDefault(); // ป้องกันหน้าเว็บรีเฟรช
            
            // จำลองการส่งข้อมูลไป Backend
            alert('บันทึกคำขอจองรถสำเร็จ! กรุณารอผู้บริหารอนุมัติ');
            
            // ปิด Modal และรีเซ็ตฟอร์ม
            closeModal();
            this.reset();
        });
    </script>

</body>
</html>
